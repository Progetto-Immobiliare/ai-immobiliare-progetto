<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clienti | CRM Immobiliare</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b1117;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
      background: linear-gradient(90deg, #d4af37, #b8860b);
      color: black;
      font-size: 30px;
      font-weight: bold;
    }

    .container {
      padding: 40px 20px;
    }

    .card {
      background: #161b22;
      padding: 25px;
      margin: 20px auto;
      max-width: 700px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(212,175,55,0.15);
      text-align: left;
    }

    h2 {
      color: #d4af37;
    }

    ul {
      line-height: 2;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 25px;
      background: #d4af37;
      color: black;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>Gestione Clienti</header>

<div class="container">

  <div class="card">
    <h2>Lead Attivi</h2>
    <ul>
      <li>Buyer Italia</li>
      <li>Buyer Estero</li>
      <li>Seller Ville con Piscina</li>
      <li>Investor Luxury</li>
    </ul>
  </div>

  <div class="card">
    <h2>Azioni Prioritarie</h2>
    <ul>
      <li>Follow-up giornalieri</li>
      <li>Broadcast WhatsApp</li>
      <li>LinkedIn Magnet</li>

    </ul>

  <a href="index.html" class="btn">← Torna Dashboard</a>
